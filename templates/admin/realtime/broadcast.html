{% extends "admin/base_site.html" %}
{% block content %}
<div style="max-width: 600px; margin: 50px auto; padding: 20px;">
    <h2>📢 Broadcast Message</h2>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Title:</label>
            <input type="text" name="title" required style="width: 100%; padding: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Message:</label>
            <textarea name="message" required rows="4" style="width: 100%; padding: 8px;"></textarea>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Notification Type:</label>
            <select name="notification_type" style="width: 100%; padding: 8px;">
                <option value="in_app">In-App Notification</option>
                <option value="email">Email</option>
                <option value="sms">SMS</option>
            </select>
        </div>
        <button type="submit" style="background: #2d6a4f; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">Send Broadcast</button>
        <a href="{% url 'admin:realtime_notification_changelist' %}" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
