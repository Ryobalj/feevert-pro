# render.yaml - Blueprint kwa ajili ya Render Deployment
# Hii itatengeneza Backend, Frontend, na Database kiotomatiki

services:
  # ============================================
  # BACKEND SERVICE (Django REST API)
  # ============================================
  - type: web
    name: feevert-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn feevert.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,feevert.co.tz,www.feevert.co.tz
      - key: USE_REDIS
        value: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@feevert.co.tz
      - key: FRONTEND_URL
        value: https://feevert-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: feevert-db
          property: connectionString

  # ============================================
  # FRONTEND SERVICE (React Vite)
  # ============================================
  - type: web
    name: feevert-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://feevert-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

# ============================================
# DATABASE (PostgreSQL)
# ============================================
databases:
  - name: feevert-db
    databaseName: feevert
    plan: free